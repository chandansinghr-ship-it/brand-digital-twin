name: Bulkhead CI

on:
  pull_request:
    paths:
      - "artifacts/api-server/**"
      - "lib/db/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/bulkhead-ci.yml"
  push:
    branches: [main]
    paths:
      - "artifacts/api-server/**"
      - "lib/db/**"
      - ".github/workflows/bulkhead-ci.yml"
  workflow_dispatch: {}

# Task #7 acceptance: the manual-mode bulkhead must be guarded by a
# CI smoke that exercises the lock semantics + audit outbox + p95
# latency envelope on every change to the API server or the db schema.
# A failure here MUST fail the build (the test file asserts p95<2000ms).
jobs:
  bulkhead-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanmatra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/tanmatra_test
      GOOGLE_API_KEY: test
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/db run push-force
      - name: Run bulkhead smoke (lock semantics + outbox + p95<2s)
        run: pnpm --filter @workspace/api-server run ci:bulkhead
