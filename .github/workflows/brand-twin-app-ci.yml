name: brand-twin-app CI

# Standalone Next.js product UI (brand-twin/app) — NOT in the Tanmatra pnpm
# workspace, so it needs its own install/typecheck/build gate. Runs only when
# files under brand-twin/app change.

on:
  push:
    branches: [main]
    paths:
      - "brand-twin/app/**"
      - ".github/workflows/brand-twin-app-ci.yml"
  pull_request:
    paths:
      - "brand-twin/app/**"
      - ".github/workflows/brand-twin-app-ci.yml"

defaults:
  run:
    working-directory: brand-twin/app

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: brand-twin/app/package-lock.json

      - name: Install (locked)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
