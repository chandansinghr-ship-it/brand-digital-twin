name: Bulkhead CI

on:
  pull_request:
    paths:
      - "artifacts/api-server/**"
      - "lib/db/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/bulkhead-ci.yml"
  push:
    branches: [main]
    paths:
      - "artifacts/api-server/**"
      - "lib/db/**"
      - ".github/workflows/bulkhead-ci.yml"
  workflow_dispatch: {}

# Task #7 acceptance: the manual-mode bulkhead must be guarded by a
# CI smoke that exercises the lock semantics + audit outbox + p95
# latency envelope on every change to the API server or the db schema.
# A failure here MUST fail the build (the test file asserts p95<2000ms).
jobs:
  bulkhead-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanmatra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/tanmatra_test
      GOOGLE_API_KEY: test
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      # pnpm version is pinned via `packageManager` in package.json so
      # local + CI + Docker all use the exact same release. Do not
      # specify `with: version:` here — the action errors on conflict.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/db run push-force
      - name: Run bulkhead smoke (lock semantics + outbox + p95<2s)
        run: pnpm --filter @workspace/api-server run ci:bulkhead

      # HTTP-level acceptance proof: boot the api-server, seed orders +
      # a rider through the override flow, then peg /dispatch/run while
      # firing concurrent /dispatch/override requests. Asserts override
      # p95 < 2000ms via the loadtest script. This is the explicit
      # endpoint-level SLO gate the task requires.
      - name: Build api-server
        env:
          PORT: "8080"
          BASE_PATH: "/"
        run: pnpm --filter @workspace/api-server run build
      - name: Boot api-server in background
        env:
          PORT: "8080"
          BASE_PATH: "/"
          RD_ADMIN_TOKEN: "ci-bulkhead-admin-token"
          NODE_ENV: "test"
        run: |
          pnpm --filter @workspace/api-server run start > /tmp/api-server.log 2>&1 &
          echo $! > /tmp/api-server.pid
          for i in {1..40}; do
            if curl -fsS http://localhost:8080/api/healthz >/dev/null 2>&1; then
              echo "api-server is up"; exit 0
            fi
            sleep 0.5
          done
          echo "api-server failed to boot"; tail -200 /tmp/api-server.log; exit 1
      - name: Seed override fixtures (orders + rider)
        id: seed
        run: |
          IDS=$(node ./artifacts/api-server/scripts/seed-loadtest-fixtures.mjs)
          echo "fixtures=$IDS" >> "$GITHUB_OUTPUT"
      - name: HTTP loadtest — override p95 must stay under 2s
        env:
          BASE_URL: "http://localhost:8080"
          RD_ADMIN_TOKEN: "ci-bulkhead-admin-token"
          ORDER_IDS: ${{ steps.seed.outputs.fixtures }}
          RIDER_ID: "1"
        run: pnpm --filter @workspace/api-server run loadtest:override -- --duration-ms 8000 --p95-budget-ms 2000
      - name: Tail api-server log on failure
        if: failure()
        run: tail -300 /tmp/api-server.log || true
      - name: Stop api-server
        if: always()
        run: kill "$(cat /tmp/api-server.pid)" 2>/dev/null || true
