name: bulkhead-perf-nightly

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  cpu-burn-soak:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: tanmatra
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/tanmatra
      ADMIN_TOKEN: ci-admin-token
      LOADTEST_CPU_BURN_WORKERS: "4"
      PG_POOL_MAX: "16"
      PG_OVERRIDE_POOL_MAX: "4"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/db run push:force
      - run: node artifacts/api-server/scripts/seed-loadtest-fixtures.mjs
      - name: Boot api-server
        run: pnpm --filter @workspace/api-server run start &
      - name: Wait for /healthz
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8080/api/healthz && exit 0 || sleep 1
          done
          exit 1
      - name: Loadtest with 90% CPU burn
        run: pnpm --filter @workspace/api-server run loadtest:override -- --duration-ms 30000
