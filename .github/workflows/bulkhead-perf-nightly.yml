name: bulkhead-perf-nightly

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  cpu-burn-soak:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: tanmatra
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/tanmatra
      RD_ADMIN_TOKEN: ci-admin-token
      OPS_TOKEN: ci-admin-token
      LOADTEST_CPU_BURN_WORKERS: "4"
      PG_POOL_MAX: "16"
      PG_OVERRIDE_POOL_MAX: "4"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/db run push-force
      - name: Seed fixtures and capture order ids
        id: seed
        run: |
          ids=$(node artifacts/api-server/scripts/seed-loadtest-fixtures.mjs)
          echo "order_ids=$ids" >> "$GITHUB_OUTPUT"
          echo "Seeded orders: $ids"
      - name: Boot api-server
        env:
          PORT: "8080"
          BASE_PATH: "/"
          NODE_ENV: "production"
        run: |
          pnpm --filter @workspace/api-server run start \
            > /tmp/api-server.log 2>&1 &
          echo $! > /tmp/api-server.pid
      - name: Wait for /healthz
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/api/healthz; then
              echo "api-server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::api-server failed to start"
          tail -200 /tmp/api-server.log
          exit 1
      - name: Loadtest with 90% CPU burn
        env:
          ORDER_IDS: ${{ steps.seed.outputs.order_ids }}
          RIDER_ID: "1"
        run: pnpm --filter @workspace/api-server run loadtest:override -- --duration-ms 30000
