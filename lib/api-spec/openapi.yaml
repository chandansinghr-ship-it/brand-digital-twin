          items:
            type: object
            required: [id, name, qty, price]
            properties:
              id: { type: integer }
              name: { type: string }
              qty: { type: integer, minimum: 1 }
              price: { type: integer, description: Per-unit price in paise }
        applyCreditsPaise: { type: integer, nullable: true }
        scheduledFor: { type: string, format: date-time, nullable: true }
        bundleSlugs: { type: array, items: { type: string } }
        fulfillmentType: { type: string, enum: [delivery, pickup] }
        deliverySlotId: { type: integer, nullable: true }
        pickupLocationId: { type: integer, nullable: true }
        ecoPackagingOptIn: { type: boolean }
        deliveryInstructions: { type: string, nullable: true }
    OrderFinalizeResult:
      type: object
      required: [ok]
      additionalProperties: true
      properties:
        ok: { type: boolean }
        serverOrderId: { type: integer }
        finalTotalPaise: { type: integer }
        creditsRedeemedPaise: { type: integer }
