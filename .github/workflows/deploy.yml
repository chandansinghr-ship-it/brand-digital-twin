name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Don't let two pushes to main race each other into Cloud Run / Firebase.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  # Detect which surfaces this push touched so we don't redeploy unchanged
  # services. Outputs are read by the deploy jobs below via `needs`.
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'artifacts/api-server/**'
              - 'lib/**'
              - 'Dockerfile'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/deploy.yml'
            web:
              - 'artifacts/tanmatra/**'
              - 'lib/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/deploy.yml'

  # Build the api-server Docker image with Cloud Build, then roll the
  # `wellness-foods` Cloud Run service. Runs only when backend-relevant
  # files changed.
  cloud-run:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GCP_PROJECT: omnismtp
      GCP_REGION: asia-south2
      SERVICE: wellness-foods
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # The Cloud Build GitHub trigger (set up server-side, watches
      # pushes to main) is the canonical build + deploy path. It
      # already builds the Dockerfile and rolls Cloud Run on every
      # backend-touching commit. This job's role is to *verify* that
      # rollout succeeded — not to duplicate the build (which kept
      # failing for permission reasons and produced a misleading red
      # badge on every push).

      - name: Snapshot current Cloud Run revision (baseline)
        id: baseline
        run: |
          BASELINE=$(gcloud run services describe ${SERVICE} \
            --region ${GCP_REGION} --project ${GCP_PROJECT} \
            --format='value(status.latestReadyRevisionName)' 2>/dev/null || echo "none")
          echo "baseline=$BASELINE" >> "$GITHUB_OUTPUT"
          echo "Pre-push revision: $BASELINE"

      - name: Wait for trigger to deploy a new revision
        id: wait
        env:
          BASELINE: ${{ steps.baseline.outputs.baseline }}
        run: |
          # Poll for up to 8 minutes — covers a typical Cloud Build
          # build (3-5 min) + Cloud Run rollout (~30s).
          DEADLINE=$((SECONDS + 480))
          while [ $SECONDS -lt $DEADLINE ]; do
            CURRENT=$(gcloud run services describe ${SERVICE} \
              --region ${GCP_REGION} --project ${GCP_PROJECT} \
              --format='value(status.latestReadyRevisionName)' 2>/dev/null || echo "")
            if [ -n "$CURRENT" ] && [ "$CURRENT" != "$BASELINE" ]; then
              echo "✓ new revision live: $CURRENT (baseline was $BASELINE)"
              echo "revision=$CURRENT" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "  …still on $CURRENT (waiting for trigger)"
            sleep 15
          done
          echo "::error::Cloud Build trigger did not produce a new Cloud Run revision within 8 minutes."
          echo "::error::Inspect https://console.cloud.google.com/cloud-build/builds?project=${GCP_PROJECT}"
          exit 1

      - name: Smoke-test /api/healthz on the new revision
        run: |
          URL=$(gcloud run services describe ${SERVICE} \
            --region ${GCP_REGION} --project ${GCP_PROJECT} \
            --format='value(status.url)')
          echo "Service URL: $URL"
          # Cloud Run can take a few seconds to fully drain old traffic;
          # retry a handful of times before failing.
          for i in 1 2 3 4 5 6 7 8; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL/api/healthz" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ healthz OK on revision ${{ steps.wait.outputs.revision }}"
              exit 0
            fi
            echo "healthz attempt $i returned $STATUS, retrying..."
            sleep 5
          done
          echo "::error::healthz never returned 200. New revision may be crash-looping."
          exit 1

  # Build the SPA and deploy to Firebase Hosting.
  #
  # Previously this job waited on `cloud-run` so the new admin login page
  # never went live before the new login API. We've moved the actual API
  # deploy to a Cloud Build trigger that watches GitHub directly (the
  # GH Actions cloud-run job below is now a redundant smoke path that
  # often fails), so blocking firebase on it would mean the frontend
  # never ships. Decoupled — firebase now runs on every push that
  # touches web-relevant paths, regardless of cloud-run's result.
  #
  # Risk accepted: a frontend that references a not-yet-deployed API
  # endpoint will see 404s until the trigger-driven Cloud Run rollout
  # finishes (typically <5 min). Re-couple if this becomes a real
  # incident pattern.
  firebase:
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from `packageManager` in package.json so all
      # workflows + local + Docker stay in lockstep.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tanmatra
        run: pnpm --filter @workspace/tanmatra run build
        env:
          NODE_ENV: production
          # Vite config requires these at build time even though Firebase
          # Hosting serves the SPA at root and never reads PORT.
          BASE_PATH: /
          PORT: "5173"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TANMATRA_1D763 }}
          projectId: tanmatra-1d763
          channelId: live
          entryPoint: artifacts/tanmatra
