# Superseded by .github/workflows/deploy.yml, which deploys the
# api-server (Cloud Run) and the frontend (Firebase Hosting) together
# and chains the frontend behind a successful backend rollout.
#
# Kept as a manual-dispatch-only workflow so we can still trigger a
# frontend-only redeploy from the Actions UI if Cloud Run is healthy
# and we just want to reship the SPA.
name: Deploy frontend to Firebase Hosting (manual)

on:
  workflow_dispatch: {}

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tanmatra
        run: pnpm --filter @workspace/tanmatra run build
        env:
          NODE_ENV: production
          # Vite config requires these at build time even though Firebase
          # Hosting serves the SPA at root and never reads PORT.
          BASE_PATH: /
          PORT: "5173"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TANMATRA_1D763 }}
          projectId: tanmatra-1d763
          channelId: live
          entryPoint: artifacts/tanmatra
