# CI/CD pipeline spec for Brand Digital Twin OS (backend engine).
# GitHub Actions is the primary CI (.github/workflows/); this Azure Pipelines
# spec mirrors the same locked-install + strict tsc build gate.
name: brand-digital-twin-ci

trigger:
  branches:
    include:
      - main
      - releases/*

jobs:
  - job: build_and_test
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - task: NodeTool@0
        inputs:
          versionSpec: '20.x'
        displayName: 'Install Node.js'

      - script: |
          npm ci
        displayName: 'Install Dependencies'

      - script: |
          npm audit --audit-level=high
        displayName: 'Dependency Security Audit'

      - script: |
          npm run build
        displayName: 'TypeScript Build (typecheck + emit)'
